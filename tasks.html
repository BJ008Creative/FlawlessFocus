<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to your FocusArea</title>
    <link rel="stylesheet" href="styles1.css">
</head>
<body>
    <div class="header"><h1>All the Best!!Believe you are better.Lets prove it!!!</h1></div>
    <div class="time">
        <div class="timer">
        <h1>Your Personal Timer</h1>
        
        <div class="clock">
            <div class="inner">
               
                
                
            
                <div class="digital-timer">
                    <div class="timeinvalue" id="time">00:00</div>

                </div>
            </div>
        
        
    </div>
        
    </div>
    <div class="drop">
    <h1>Choose your Option!</h1>
    

    <div class="fake-select">
    <div class="selected">Time</div>

    <div class="menu">
        <div class="item" ><button id="1">25 mins</button></div>
        <div class="item" ><button id="2">30 mins</button></div>
        <div class="item" ><button id="3">40 mins</button></div>
        <div class="item" ><button id="4">50 mins</button></div>
        <div class="item" ><button id="5">60 mins</button></div>
        
    </div>
</div>
<div class="playbutton"><button id="play"></button></div>

    </div>
    </div>
    <div class="taskbar"><div class="taskbarheading"><h1>Task-Log</h1></div>
        <div class="sections">
            <div class="journal-section"><h1>Journal</h1>
                <div class="datearea">
                    <div class="date" id="date">
                    29-05-26
                </div>
                <input type="date" id="journalCalendar" class="journaldatechoose">
                </div>
                
                <textarea class="textPlace"></textarea>
            </div>
            <div class="to-do"><h1>to-do List</h1>
            <button onclick="
                addText();
                resetText();
                dropList();
                

                " 
                class="addButton">Add</button>
            <button onclick="
                resetList();
            " class="resetButton">Reset</button>
            
            <input placeholder="Lets do it!!Press enter to add it." class="text" >
            <input type="date" id="calendar" class="datebutton">
            

            
            
            
            <div class="to-doList"></div>
            
            
            
        </div>
        
        </div>
        
        
    </div>
    <div class="PlayList"><h1>MusicZone</h1>

    </div>
    
    
    
<script src="script.js"></script>    
</body>
</html>
